
    
<div class="navbar-container block w-full fixed top-0 left-0 z-100  p-4" >
    <div class="navbar w-[80%] m-auto flex items-center justify-evenly p-1 rounded-lg border border-gray-800/5 bg-white/30 ">
         <div class="logo w-[10%] px-2 ">
       <a href="http://localhost:4200/"> <img src="assets/images/logo.png" alt="Logo EatBetter" class="logo hover:cursor-pointer" ></a>
    </div>
<form class="flex items-center max-w-sm mx-auto space-x-2 ">   
    <div class="relative w-full">
        <input type="search" id="simple-search" name="search" class="px-2 py-1.5 bg-neutral-secondary-medium border border-gray-300 rounded-lg ps-9 text-heading text-sm focus:ring-brand focus:border-brand block w-full placeholder:text-body" placeholder="Search fruit name..."   [(ngModel)]="testoDigitato" (input)="searchFruit()" />
    </div>
    <button type="submit" class="inline-flex items-center justify-center shrink-0 text-white rounded-lg bg-green-800 hover: cursor-pointer hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs rounded-base w-9 h-9 focus:outline-none " (click)="findYourFruit()">
        <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg>
        
    </button>
</form>
<button id="menu-btn" class="block md:hidden text-gray-400 hover:text-white focus:outline-none" aria-label="Toggle Menu" (click)="isToggleBtnClicked()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
        <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    @if(isToggleBtnClicked()){
        <!-- ! NON FUNZIONA: DA RIVEDERE QUALCOSA -->

        <div class="border-2 border-blue-700 z-200 w-[50%]">
            <h1>CONTENUTO DEL TOGGLE</h1>
        </div>
    }


<div class="navBar-categories w-fit mr-3 p-1 inline-flex ">
        <button class="p-1 mr-2 rounded-md hover:cursor-pointer hover:bg-green-800 hover:text-white" (click)="findFruits('All')">All</button>
        <button class="p-1 mr-2 rounded-md hover:cursor-pointer hover:bg-green-800 hover:text-white " (click)="findFruits('Sweet')">Sweet</button>
         <button class="p-1 mr-2 rounded-md hover:cursor-pointer  hover:bg-green-800 hover:text-white" (click)="findFruits('Semi-Acid')">Semi-Acid</button>
         <button class="p-1 mr-2 rounded-md hover:cursor-pointer  hover:bg-green-800 hover:text-white" (click)="findFruits('Acid')">Acid</button>
         <button class="p-1 mr-2 rounded-md hover:cursor-pointer  hover:bg-green-800 hover:text-white" (click)="findFruits('Oleaginous/Dry')">Oleaginous/Dry</button>
         <button class="p-1 rounded-md hover:cursor-pointer  hover:bg-green-800 hover:text-white" (click)="findFruits('Melon')">Melons</button>
</div>


    </div>
   
    
</div>
