<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Fascinate&display=swap" rel="stylesheet">

<section class="homePage  w-full h-full   ">
    <app-hero-section></app-hero-section>

    <div class="fruit-container w-full h-fit relative   border-2 border-blue-700 ">
      <h2 class="w-full  p-2 border border-red-600">CONTENITORE DI TUTTA LA FRUTTA</h2>
      <div class="fruitsCard-container w-[80%] m-auto mt-4 flex items-center align-middle justify-evenly flex-wrap border border-pink-600">

          @for(fruit of fruits; track $index){
              <a  class=" m-4 bg-neutral-primary-soft block max-w-sm p-6 border border-black rounded-md shadow-md hover:cursor-pointer hover:bg-neutral-secondary-medium" (click)="openModal()">
                 <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8">{{fruit.name}}</h5>
                 <p class="text-body">{{fruit.family}}</p>
              </a>
           }
      </div>
    </div>
           
  @if(isClicked()){
    <div class="modal-container absolute top-50 left-50 m-auto  border border-red-600 z-200">
       <p>Modal del frutto</p>
    </div>
  }

</section>
